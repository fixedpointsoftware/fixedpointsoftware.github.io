<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>visual 𝑛-back has moved</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Permanent redirect. GitHub Pages can't emit a 301 for a static path, so
       this is the standard static-hosting equivalent: canonical + meta-refresh
       + JS replace, and noindex so the old URL drops out of search in favour of
       the canonical. visual 𝑛-back now lives at its own site, nback.xyz. -->
  <link rel="canonical" href="https://nback.xyz/">
  <meta http-equiv="refresh" content="0; url=https://nback.xyz/">
  <meta name="robots" content="noindex">
  <script>location.replace("https://nback.xyz/");</script>
</head>

<body>
  <p>visual 𝑛-back has moved to <a href="https://nback.xyz/">nback.xyz</a>.</p>
</body>

</html>
